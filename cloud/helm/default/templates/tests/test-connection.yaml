apiVersion: v1
kind: Pod
metadata:
    # checkov:skip=CKV_K8S_21:Namespace is set dynamically
    # checkov:skip=CKV_K8S_9:Readiness probe not required for test pod
    # checkov:skip=CKV_K8S_20:Allow privilege escalation is allowed for test pod
    # checkov:skip=CKV_K8S_31:Seccomp profile not required for test pod
    # checkov:skip=CKV_K8S_30:Security context not required for test pod
    # checkov:skip=CKV_K8S_40:User UID not required for test pod
    # checkov:skip=CKV_K8S_8:Liveness probe not required for test pod
    # checkov:skip=CKV_K8S_14:Image tag is fixed
    # checkov:skip=CKV_K8S_28:NET_RAW not used
    # checkov:skip=CKV_K8S_23:Root container allowed for test pod
    # checkov:skip=CKV_K8S_29:Security context not required for test pod
    # checkov:skip=CKV_K8S_37:Capabilities not required for test pod
    # checkov:skip=CKV_K8S_38:Service account token mounting is optional
    # checkov:skip=CKV_K8S_13:Resource limits not required for test pod
    # checkov:skip=CKV_K8S_43:Image digest not required
    # checkov:skip=CKV_K8S_12:Resource requests not required
    annotations:
        helm.sh/hook: test
    labels:
        {{- include "liferay.labels" . | nindent 8 }}
    name: {{ include "liferay.name" . }}-test-connection
    namespace: {{ include "liferay.namespace" . }}
spec:
    containers:
        -   command:
                -   /bin/sh
                -   -c
                -   |
                        trap "echo 'Received signal to terminate.'; exit 0" SIGINT SIGTERM

                        START_TIME=$(date +%s)

                        until nc -vz -w 2 {{ include "liferay.name" . }} {{ (index .Values.service.ports 1).port }}
                        do
                            CURRENT_TIME=$(date +%s)

                            DELTA_TIME=$((${CURRENT_TIME} - ${START_TIME}))

                            if [ ${DELTA_TIME} -gt 300 ]
                            then
                                echo "Liferay did not start."

                                exit 1
                            fi

                            echo "Waiting for Liferay..."

                            sleep 2
                        done
            image: busybox:latest
            name: test-connection
    restartPolicy: Never
    serviceAccountName: {{ include "liferay.serviceAccountName" . }}
