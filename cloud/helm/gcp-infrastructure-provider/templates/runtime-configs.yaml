# 5. Runtime Config for GCP Cloud Platform Provider
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-90"
    name: gcp-cloudplatform-config
spec:
    deploymentTemplate:
        spec:
            selector:
                matchLabels:
                    pkg.crossplane.io/provider: provider-gcp-cloudplatform
            template:
                metadata:
                    labels:
                        pkg.crossplane.io/provider: provider-gcp-cloudplatform
                spec:
                    containers:
                        -   name: package-runtime
                            resources:
                                limits:
                                    cpu: 1000m
                                    memory: 1.5Gi
                                requests:
                                    cpu: 200m
                                    memory: 256Mi
                    serviceAccountName: provider-gcp-cloudplatform
    serviceAccountTemplate:
        metadata:
            annotations:
                # This provider requires a full GSA to manage IAM policies and GSAs reliably.
                # Otherwise all the IAM calls fail with a precondition check when using just a KSA: 
                #    Caller must use first-party authentication in order to accept terms of service and use this API.
                iam.gke.io/gcp-service-account: {{ printf "%s-cp-iam@%s.iam.gserviceaccount.com" .Values.deploymentName .Values.gcp.projectId }}
            name: provider-gcp-cloudplatform
