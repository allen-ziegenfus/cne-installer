kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
metadata:
    name: liferay-route
    namespace: {{ .Release.Namespace | quote }}
spec:
    hostnames:
        -   {{ printf "%s.%s" .Release.Namespace .Values.rootDomain | quote }}
    parentRefs:
        -   name: shared-gateway
            namespace: infra
    rules:
        -   backendRefs:
                -   name: liferay-default
                    port: 8080
