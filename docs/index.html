<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liferay Cloud Native Documentation</title>
  <link rel="icon" href="https://www-cdn.liferay.com/documents/d/guest/liferay-logo">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation for Liferay Cloud Native GCP Installer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Official Dark Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      /* Bigger fonts for better readability */
      --content-max-width: 900px;
      --font-size-base: 18px;
    }
    body {
      font-size: 18px !important;
    }
    .sidebar {
      font-size: 16px !important;
    }
    .markdown-section {
      padding-top: 40px !important;
    }
    /* Search box styling for dark theme */
    .search input {
      background-color: #2d333b !important;
      color: #adbac7 !important;
      border: 1px solid #444c56 !important;
    }
  </script>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Liferay Cloud Native',
      repo: 'https://github.com/Ziggy-AZ/cne-installer',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      // Fix for subfolder/GitHub Pages hosting
      relativePath: true,
      // Search configuration
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found!',
        depth: 6
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
