<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liferay Cloud Native Documentation</title>
  <link rel="icon" href="https://www-cdn.liferay.com/documents/d/guest/liferay-logo">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Docsify Themeable - Simple Dark -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <style>
    :root {
      /* Theme Customization */
      --base-font-size: 18px;
      --theme-color: #2ea44f;
      --content-max-width: 90rem;
      
      /* High Contrast Sidebar */
      --sidebar-background: #1a1b1c;
      --sidebar-name-color: #2ea44f;
      --sidebar-nav-link-color: #e1e4e8;
      --sidebar-nav-link-color--active: #2ea44f;
      --sidebar-nav-link-font-size: 1.1rem;
      --sidebar-nav-link-font-weight: 500;
      
      /* Table Fixes (Ensuring no gray-on-white) */
      --table-background: #22272e;
      --table-head-background: #2d333b;
      --table-body-color: #adbac7;
      --table-head-color: #adbac7;
      --table-cell-border-color: #444c56;
    }

    /* Force Table Text Visibility */
    table {
        color: #adbac7 !important;
        background-color: #22272e !important;
    }
    th {
        background-color: #2d333b !important;
        color: #2ea44f !important;
    }
    td {
        border-color: #444c56 !important;
    }

    /* Code Block Contrast */
    pre, code {
        background-color: #0d1117 !important;
        color: #c9d1d9 !important;
    }

    /* Sidebar Headings */
    .sidebar-nav strong {
        color: #2ea44f;
        font-size: 1.2rem;
        display: block;
        margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Liferay Cloud Native',
      repo: 'https://github.com/Ziggy-AZ/cne-installer',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      // Pathing fix
      basePath: './',
      homepage: 'README.md',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found!',
        depth: 6
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
