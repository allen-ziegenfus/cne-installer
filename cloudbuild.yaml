steps:
    # Step 0: Security Scan (Checkov)
    - name: 'bridgecrew/checkov:latest'
      id: 'checkov'
      entrypoint: 'sh'
      args:
        - '-c'
        - |
            if [ "${_ONLY}" != "checkov" ] && [ "${_ONLY}" != "all" ]; then exit 0; fi
            echo "[$(date)] Starting Checkov Scan..."
            checkov --directory=. --config-file=.checkov.yaml --download-external-modules=true --skip-framework secrets
    
    # Step 1: Security Scan (Trivy)
    - name: 'aquasec/trivy:latest'
      id: 'trivy'
      entrypoint: 'sh'
      args:
        - '-c'
        - |
            if [ "${_ONLY}" != "trivy" ] && [ "${_ONLY}" != "all" ]; then exit 0; fi
            echo "[$(date)] Starting Trivy Scan..."
            trivy fs . --severity=HIGH,CRITICAL --exit-code=1 --skip-dirs cloud/terraform/gcp/gke/helm/gateway-infra

    # Step 2: Infrastructure Orchestration (Consolidated)
    - name: 'google/cloud-sdk:510.0.0-slim'
      id: 'deploy'
      entrypoint: 'bash'
      args:
        - '-c'
        - |
            set -e -o pipefail
            
            # Helper to run infra-manager apply
            apply_deployment() {
                local name=$1
                local source=$2
                echo "--------------------------------------------------"
                echo "[$(date '+%H:%M:%S')] Applying Deployment: $name"
                echo "--------------------------------------------------"
                gcloud infra-manager deployments apply projects/${PROJECT_ID}/locations/${_REGION}/deployments/$name \
                    --service-account=projects/${PROJECT_ID}/serviceAccounts/infra-manager-runner@${PROJECT_ID}.iam.gserviceaccount.com \
                    --local-source=$source \
                    --inputs-file=terraform.tfvars 2>&1 | while read -r line; do printf "[%s] %s\n" "$(date '+%H:%M:%S')" "$line"; done
            }

            # 1. Artifact Registry
            if [ "${_ONLY}" == "gar" ] || [ "${_ONLY}" == "all" ]; then
                apply_deployment "gar-registry" "cloud/terraform/gcp/gar"
            fi

            # 2. Publish Helm Charts
            if [ "${_ONLY}" == "publish-charts" ] || [ "${_ONLY}" == "all" ]; then
                echo "[$(date '+%H:%M:%S')] Installing Helm..."
                curl --silent https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash > /dev/null

                REGION=$(grep -E '^[[:space:]]*region[[:space:]]*=' terraform.tfvars | cut -d'=' -f2 | tr -d ' "' || echo "${_REGION}")
                DEPLOY_NAME=$(grep -E '^[[:space:]]*deployment_name[[:space:]]*=' terraform.tfvars | cut -d'=' -f2 | tr -d ' "' || echo "liferay-gcp")
                GAR_REPO="${DEPLOY_NAME}-registry"

                gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet > /dev/null 2>&1

                push_chart() {
                    local path=$1
                    local name=$(helm show chart "$path" | grep '^name:' | cut -d' ' -f2)
                    local version=$(helm show chart "$path" | grep '^version:' | cut -d' ' -f2)
                    local image_path="${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}/${name}"

                    if gcloud artifacts docker images describe "${image_path}:${version}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
                        echo "Version ${version} of ${name} already exists. Skipping."
                        return 0
                    fi

                    echo "Pushing ${name}:${version} to ${GAR_REPO}..."
                    if [ -f "$path/Chart.yaml" ]; then helm dependency build "$path" > /dev/null; fi
                    helm package "$path" > /dev/null
                    helm push "${name}-${version}.tgz" "oci://${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}" > /dev/null
                    rm "${name}-${version}.tgz"
                }

                push_chart "cloud/helm/default"
                push_chart "cloud/helm/gcp"
                push_chart "cloud/helm/gcp-infrastructure"
                push_chart "cloud/helm/gcp-infrastructure-provider"
            fi

            # 3. Network / GKE
            if [ "${_ONLY}" == "gke" ] || [ "${_ONLY}" == "all" ]; then
                apply_deployment "gke-network" "cloud/terraform/gcp/gke"
            fi

            # 4. Kyverno
            if [ "${_ONLY}" == "kyverno" ] || [ "${_ONLY}" == "all" ]; then
                apply_deployment "kyverno" "cloud/terraform/gcp/kyverno"
            fi

            # 5. GitOps Platform
            if [ "${_ONLY}" == "platform" ] || [ "${_ONLY}" == "all" ]; then
                apply_deployment "gitops-platform" "cloud/terraform/gcp/gitops/platform"
            fi

            # 6. GitOps Resources
            if [ "${_ONLY}" == "resources" ] || [ "${_ONLY}" == "all" ]; then
                apply_deployment "gitops-resources" "cloud/terraform/gcp/gitops/resources"
            fi

substitutions:
    _REGION: 'us-central1'
    _ONLY: 'all'

options:
    logging: CLOUD_LOGGING_ONLY
    dynamic_substitutions: true
